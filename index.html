<!doctype html>
<html lang="ko">
  <head>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>트래블라잇 - 국가별 여행 정보 올인원</title>
    <meta
      name="description"
      content="비자·입국 서류, 세관 반입, 항공사 규정, 날씨·패킹, 현지 꿀팁까지. 정부·항공사 공식 출처로 한 번에 확인하는 국가별 여행 준비 서비스."
    />

    <!-- Open Graph (링크 공유 미리보기 카드) -->
    <!-- 배포 후에는 og:image / twitter:image를 절대 URL(예: https://내도메인/og-image.png)로 바꿔주세요. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TravLight" />
    <meta property="og:title" content="TravLight — 국가별 여행 준비 정보 올인원" />
    <meta
      property="og:description"
      content="비자·세관 반입·항공사 규정·날씨·현지 꿀팁까지, 정부·항공사 공식 출처로 한 번에."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="TravLight - 가려는 나라의 준비 정보, 한 곳에서 공식 출처로" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TravLight — 국가별 여행 준비 정보 올인원" />
    <meta name="twitter:description" content="비자·세관·항공사·날씨·꿀팁까지, 공식 출처로 한 번에." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Phosphor Icons (전역 아이콘 폰트) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Pretendard Font -->
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
